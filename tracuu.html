<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ điển Tra cứu BVTV - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <div class="flex items-center justify-between border-b pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-indigo-700">📖 Từ điển Tra Cứu Thuốc BVTV</h1>
                <p class="text-sm text-gray-500 mt-1">Tra cứu nhanh thông tin sản phẩm</p>
            </div>
            <a href="index.html" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-700 transition">🛒 Quay lại quầy bán hàng</a>
        </div>

        <div class="mb-6 relative">
            <input type="text" id="searchDict" class="w-full border-2 border-indigo-200 p-4 rounded-xl text-lg focus:outline-none focus:border-indigo-600" placeholder="🔍 Gõ tên thuốc, hoạt chất, phân nhóm hoặc công ty để tra cứu..." disabled>
            <div class="absolute right-4 top-5 text-gray-400 text-sm" id="resultCount"></div>
        </div>

        <div class="overflow-y-auto custom-scrollbar border rounded-xl max-h-[500px]">
            <table class="w-full text-left border-collapse">
                <thead class="sticky top-0 bg-indigo-50 shadow-sm">
                    <tr class="text-indigo-900 font-bold text-sm">
                        <th class="p-4 border-b">Tên thuốc</th>
                        <th class="p-4 border-b">Hoạt chất</th>
                        <th class="p-4 border-b">Phân nhóm</th>
                        <th class="p-4 border-b">Công ty</th>
                    </tr>
                </thead>
                <tbody id="dictTableBody" class="text-sm">
                    <tr><td colspan="4" class="p-8 text-center text-gray-400">Đang nạp dữ liệu từ điển, vui lòng chờ giây lát...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="mt-4 text-xs text-gray-400 text-right">Mật khẩu xác nhận: 1303</div>
    </div>

    <script>
        let masterDictionary = [];

        async function loadDictionary() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Không tải được file từ điển!');
                masterDictionary = await response.json();
                
                const searchInput = document.getElementById('searchDict');
                searchInput.disabled = false;
                document.getElementById('dictTableBody').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">Nhập từ khóa (tối thiểu 2 ký tự) để bắt đầu tra cứu.</td></tr>`;
            } catch (error) {
                console.error(error);
                document.getElementById('dictTableBody').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500">❌ Lỗi tải file dữ liệu 'data.json'.</td></tr>`;
            }
        }

        const searchInput = document.getElementById('searchDict');
        const tbody = document.getElementById('dictTableBody');
        const resultCount = document.getElementById('resultCount');

        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim().toLowerCase();
            
            if (keyword.length < 2) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">Nhập từ khóa (tối thiểu 2 ký tự) để bắt đầu tra cứu.</td></tr>`;
                resultCount.innerText = "";
                return;
            }

            // Dùng đúng key trong json của sếp: "Tên thuốc", "Hoạt chất", "Phân nhóm", "Công ty"
            const matches = masterDictionary.filter(item => 
                (item["Tên thuốc"] && item["Tên thuốc"].toLowerCase().includes(keyword)) || 
                (item["Hoạt chất"] && item["Hoạt chất"].toLowerCase().includes(keyword)) || 
                (item["Phân nhóm"] && item["Phân nhóm"].toLowerCase().includes(keyword)) || 
                (item["Công ty"] && item["Công ty"].toLowerCase().includes(keyword))
            ).slice(0, 200);

            tbody.innerHTML = "";
            
            if (matches.length > 0) {
                resultCount.innerText = `Tìm thấy ${matches.length} kết quả`;
                matches.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b transition">
                            <td class="p-4 font-bold text-indigo-700">${item["Tên thuốc"] || ''}</td>
                            <td class="p-4 text-gray-600">${item["Hoạt chất"] || ''}</td>
                            <td class="p-4 text-gray-700">${item["Phân nhóm"] || ''}</td>
                            <td class="p-4 font-semibold text-blue-600">${item["Công ty"] || ''}</td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">⚠️ Không tìm thấy sản phẩm nào khớp với từ khóa.</td></tr>`;
                resultCount.innerText = "0 kết quả";
            }
        });

        loadDictionary();
    </script>
</body>
</html>
